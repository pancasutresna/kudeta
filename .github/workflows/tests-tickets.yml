name: tests-tickets

on:
  pull_request:
    paths:
      - 'tickets/**'
  
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - name: tests-tickets
        run: |
          cd tickets && npm install && npm run test:ci
        env:
          JWT_KEY: ${{secrets.JWT_KEY}}
